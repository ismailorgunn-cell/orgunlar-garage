<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ORGUNLAR GARAGE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:1200px;
  margin:auto;
  padding:0 20px;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.logo{
  font-weight:bold;
  font-size:20px;
}

.whatsapp-btn{
  background:#ff2a2a;
  padding:10px 20px;
  border-radius:30px;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
}

.hero-grid{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:40px;
  width:100%;
}

/* TEXT */
.hero-text h1{
  font-size:60px;
  line-height:1.1;
}

.white{color:#fff}
.red{color:#ff2a2a}

/* CARD */
.card{
  background:#111;
  padding:25px;
  border-radius:20px;
  width:320px;
}

.card div{
  padding:15px;
  border:1px solid #333;
  margin-bottom:10px;
  border-radius:10px;
}

/* EXPERTIZ */
.expertiz{
  padding:60px 20px;
}

.expertiz img{
  width:100%;
  border-radius:20px;
}

/* MOBILE */
@media(max-width:768px){

.hero-grid{
  flex-direction:column;
}

.hero-text h1{
  font-size:36px;
}

.card{
  width:100%;
}

}

</style>
</head>

<body>

<header class="container">
  <div class="logo">ORGUNLAR GARAGE</div>
  <div class="whatsapp-btn">WhatsApp</div>
</header>

<section class="hero container">
  <div class="hero-grid">

    <div class="hero-text">
      <h1>
        <span class="white">Premium Araç</span><br>
        <span class="red">Servisi</span><br>
        <span class="white">Garantili & Yetkili</span><br>
        <span class="red">Ekspertiz</span>
      </h1>
    </div>

    <div class="card">
      <div>📞 Hemen Ara</div>
      <div>💬 WhatsApp Yaz</div>
      <div>📍 Konum</div>
    </div>

  </div>
</section>

<section class="expertiz container">
  <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?q=80&w=1200" alt="">
</section>

</body>
</html>
